name: Build Docker Image

on:
  workflow_dispatch:
  schedule:
    # Every Monday 09:00 Asia/Shanghai.
    - cron: "0 1 * * 1"

env:
  DOCKER_IMAGE: superng6/nginx
  GHCR_IMAGE: ghcr.io/superng6/nginx
  NGINX_DOWNLOAD_URL: https://nginx.org/en/download.html

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      should_build: ${{ steps.check.outputs.should_build }}
      changes_url: ${{ steps.check.outputs.changes_url }}
    steps:
      - name: Check latest stable nginx version
        id: check
        shell: bash
        run: |
          set -euo pipefail

          latest_version="$(
            curl -fsSL "$NGINX_DOWNLOAD_URL" |
              perl -0777 -ne 'print "$1\n" if /Stable version.*?nginx-([0-9]+\.[0-9]+\.[0-9]+)\.tar\.gz/s'
          )"

          if [[ -z "$latest_version" ]]; then
            echo "::error::Failed to parse latest stable nginx version from $NGINX_DOWNLOAD_URL"
            exit 1
          fi

          docker_tag_url="https://hub.docker.com/v2/repositories/${DOCKER_IMAGE}/tags/stable-${latest_version}"
          docker_tag_status="$(curl -sS -o /tmp/docker-tag.json -w "%{http_code}" "$docker_tag_url")"

          case "$docker_tag_status" in
            200)
              should_build=false
              echo "Docker Hub already has ${DOCKER_IMAGE}:stable-${latest_version}"
              ;;
            404)
              should_build=true
              echo "Docker Hub does not have ${DOCKER_IMAGE}:stable-${latest_version}; build is needed"
              ;;
            *)
              echo "::error::Docker Hub tag check failed with HTTP ${docker_tag_status}"
              exit 1
              ;;
          esac

          changes_url="https://nginx.org/en/CHANGES-${latest_version%.*}"

          {
            echo "version=${latest_version}"
            echo "should_build=${should_build}"
            echo "changes_url=${changes_url}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## nginx stable check"
            echo
            echo "- Latest stable: ${latest_version}"
            echo "- Docker Hub tag: ${DOCKER_IMAGE}:stable-${latest_version}"
            echo "- Build needed: ${should_build}"
            echo "- Changelog: ${changes_url}"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/386
          - linux/amd64
          - linux/arm/v6
          - linux/arm/v7
          - linux/arm64
          - linux/ppc64le
          - linux/s390x
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare platform name for artifact
        run: echo "PLATFORM_PAIR=${{ matrix.platform }}" | tr '/' '-' >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            NGINX_VERSION=${{ needs.check-version.outputs.version }}
          tags: |-
            ${{ env.DOCKER_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest as artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          retention-days: 1

  merge-and-release:
    runs-on: ubuntu-latest
    needs: [check-version, build]
    if: needs.check-version.outputs.should_build == 'true'
    permissions:
      contents: write
      packages: write
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Create and Push manifest list
        working-directory: /tmp/digests
        run: |
          set -euo pipefail

          if [[ -z "$(ls -A .)" ]]; then
            echo "::error::No digests found to merge."
            exit 1
          fi

          version="${{ needs.check-version.outputs.version }}"

          docker buildx imagetools create \
            --tag "${{ env.DOCKER_IMAGE }}:latest" \
            --tag "${{ env.DOCKER_IMAGE }}:stable-${version}" \
            --tag "${{ env.GHCR_IMAGE }}:latest" \
            --tag "${{ env.GHCR_IMAGE }}:stable-${version}" \
            $(printf '${{ env.DOCKER_IMAGE }}@sha256:%s ' *)

      - name: Inspect final images
        run: |
          version="${{ needs.check-version.outputs.version }}"

          echo "--- Inspecting Docker Hub image ---"
          docker buildx imagetools inspect "${{ env.DOCKER_IMAGE }}:stable-${version}"

          echo "--- Inspecting GHCR image ---"
          docker buildx imagetools inspect "${{ env.GHCR_IMAGE }}:stable-${version}"

      - name: Write release notes
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          CHANGES_URL: ${{ needs.check-version.outputs.changes_url }}
        run: |
          set -euo pipefail

          curl -fsSL "$CHANGES_URL" -o /tmp/nginx-changes

          awk -v version="$VERSION" '
            $0 ~ "^Changes with nginx " version "([[:space:]]|$)" { found = 1; print; next }
            found && /^Changes with nginx / { exit }
            found { print }
          ' /tmp/nginx-changes > /tmp/nginx-release-notes

          if [[ -z "$(tr -d '[:space:]' < /tmp/nginx-release-notes)" ]]; then
            echo "::error::Failed to extract release notes for nginx ${VERSION}"
            exit 1
          fi

          {
            echo "Docker images:"
            echo
            echo "- docker.io/${{ env.DOCKER_IMAGE }}:stable-${VERSION}"
            echo "- docker.io/${{ env.DOCKER_IMAGE }}:latest"
            echo "- ${{ env.GHCR_IMAGE }}:stable-${VERSION}"
            echo "- ${{ env.GHCR_IMAGE }}:latest"
            echo
            echo "Official nginx changelog:"
            echo
            cat /tmp/nginx-release-notes
            echo
            echo "Source: ${CHANGES_URL}"
          } > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          set -euo pipefail

          tag="v${VERSION}"

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release ${tag} already exists; skipping."
            exit 0
          fi

          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --title "nginx ${VERSION}" \
            --notes-file release-notes.md
